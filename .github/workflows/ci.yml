name: API Retail Sales Data Pipeline CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-docker-terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch API data
        run: |
          python src/ingestion/fetch_carts_api.py

      - name: Run PySpark tests
        run: |
          pytest tests/

      - name: Run PySpark transformation locally
        run: |
          python src/jobs/transform_orders.py

      - name: Run Docker Compose pipeline
        run: |
          docker compose up

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: |
          cd terraform
          terraform fmt -check

      - name: Terraform init
        run: |
          cd terraform
          terraform init

      - name: Terraform validate
        run: |
          cd terraform
          terraform validate